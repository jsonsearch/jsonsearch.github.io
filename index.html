<!DOCTYPE html>
<html>
<head>
<title>JSONSearch | Web live search engine for JSON database</title>
<link href="style.css" type="text/css" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=1" />
<meta name="robots" content="none" />
</head>
<body class="bgcolor">
  <center class="bgcolor">
    <h2>JSONSearch | Web live search engine for JSON database</h2>
    <div class="maxwidth">
    	<div class="form">
          <form action="/jsonsearch/" method="GET">
            <input type="url" name="url" required autofocus autocorrect="off" autocapitalize="off" placeholder="Type JSON database URL">
            <label>dataType for URL:</label>
            <select name="proxied">
                <option value="false">Don't proxy the URL</option>
                <option value="true">Proxy the URL</option>
            </select>
            <input type="submit" value="Submit">
          </form>
        </div>
    </div>
  </center>
</body>
</html>
